kind = "web"
previewPath = "/"
title = "خطط سيرك"
version = "1.0.0"
id = "artifacts/khtat-sairak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24310
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/khtat-sairak run dev"

[services.env]
PORT = "24310"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/khtat-sairak", "run", "build"]
publicDir = "artifacts/khtat-sairak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
